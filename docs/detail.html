    <style>
      /* detail 页面专用：大横幅图 */
      .detail-banner {
        width: 100%;
        height: 0;
        padding-top: 33.333%;
        position: relative;
        overflow: hidden;
        background: rgba(7, 16, 29, 0.9);
      }
      @media (max-width: 768px) {
        .detail-banner { padding-top: 56.25%; }
      }
      .detail-banner img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      /* 游戏信息区 */
      .detail-info {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 16px;
      }
      .detail-avatar-wrap {
        flex-shrink: 0;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 3px solid rgba(245, 251, 255, 0.16);
        overflow: hidden;
        background: rgba(7, 16, 29, 0.9);
      }
      .detail-avatar-wrap img {
        width: 100%; height: 100%; object-fit: cover; display: block;
      }
      .detail-meta {
        flex: 1;
      }
      .detail-meta h1 {
        margin: 0 0 6px;
        font-size: 22px;
        font-weight: 900;
        color: rgba(245, 251, 255, 0.98);
        line-height: 1.3;
      }
      .detail-tag {
        display: inline-block;
        padding: 2px 8px;
        background: rgba(111, 247, 255, 0.10);
        color: rgba(162, 244, 253, 0.92);
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .detail-play-row {
        display: flex;
        justify-content: center;
        padding: 12px 16px;
      }
      .btn-play-large {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 48px;
        width: 260px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(255, 77, 184, 0.96), rgba(255, 211, 107, 0.96));
        color: rgba(7, 17, 29, 0.96);
        font-size: 16px;
        font-weight: 800;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s;
      }
      .btn-play-large:hover { background: linear-gradient(135deg, rgba(255, 77, 184, 1), rgba(255, 211, 107, 1)); }
      .detail-section-body {
        padding: 0 16px 16px;
      }
      .detail-section-body h3 {
        margin: 12px 0 6px;
        font-size: 15px;
        font-weight: 800;
        color: rgba(245, 251, 255, 0.98);
      }
      .detail-section-body p {
        margin: 0;
        color: rgba(167, 185, 217, 0.92);
        font-size: 13px;
        line-height: 1.6;
      }
    </style>

  <body>
    <header class="header">
      <div class="nav">
        <a id="home-link" class="nav-pill" href="./index.html" style="flex-shrink:0;font-weight:700;">🏠</a>
        <div id="nav-links" class="nav-links"></div>
        <div class="lang">
          <button class="lang-btn" id="lang-btn" aria-label="Language">&#127760;</button>
          <div class="lang-dropdown" id="lang-dropdown">
            <button class="lang-option" data-lang="en-US">English</button>
            <button class="lang-option" data-lang="ja-JP">日本語</button>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <div id="app-error" style="color:#dc2626;font-size:13px;margin:10px 0;"></div>

      <!-- Display Ad -->
      <div class="ad-wrap">
        <ins class="adsbygoogle"
     style="display:block"

     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
      </div>

      <!-- 大横幅图 -->
      <div class="detail-banner">
        <img id="hero-img" src="" alt="" />
      </div>

      <!-- 游戏信息卡片 -->
      <section class="card section" style="margin-top:0;border-radius:0 0 5px 5px;">
        <div class="detail-info">
          <div class="detail-avatar-wrap">
            <img id="avatar-img" src="" alt="" />
          </div>
          <div class="detail-meta">
            <h1 id="game-title"></h1>
            <div id="crumb" class="detail-tag"></div>
          </div>
        </div>

        <div class="detail-play-row">
          <a id="play-btn" class="btn-play-large" href="./play.html">▶ Play</a>
        </div>

        <div class="detail-section-body">
          <h3>Description</h3>
          <p id="desc"></p>
          <h3>Instructions</h3>
          <p id="inst"></p>
        </div>
      </section>

      <!-- 推荐游戏 -->
      <section class="card section">
        <div class="section-head">
          <div class="section-line-left"></div>
          <h2 id="recommend-title" class="section-title"></h2>
          <div class="section-line"></div>
        </div>
        <div id="recommend-grid" class="recommend-grid"></div>
      </section>

      <!-- Multiplex Ad -->
      <div class="ad-wrap">
        <ins class="adsbygoogle"
     style="display:block"
     data-ad-format="autorelaxed"
     data-ad-client="ca-pub-3991461507516186"
     data-ad-slot="2282977275"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
      </div>
    </main>

    <footer class="footer">

        <img src="./public/static/Group%20116.png" alt="gwawog" />
        <div class="copyright">Copyright © <span id="year"></span> | All rights reserved.</div>
      </div>
    </footer>

    <script src="./generated/ja-JP.js"></script>
